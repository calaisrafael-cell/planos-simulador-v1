<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Planos eNotas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#FAFAFA;font-family:'DM Sans','Segoe UI',sans-serif;color:#111;}
    .toggle-btn{padding:8px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .toggle-btn.active{background:#111;color:#fff;}
    .toggle-btn.inactive{background:transparent;color:#666;}
    .checkbox-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid #E5E7EB;border-radius:12px;cursor:pointer;transition:all .2s;background:#fff;user-select:none;}
    .checkbox-card:hover{border-color:#F46036;background:#FFF6F3;}
    .checkbox-card.checked{border-color:#F46036;background:#FFF6F3;}
    .custom-check{width:20px;height:20px;border-radius:6px;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:1px;}
    .custom-check.checked{background:#F46036;border-color:#F46036;}
    .sell-card{display:flex;flex-direction:column;gap:4px;padding:14px 16px;border:1.5px solid #E5E7EB;border-radius:12px;cursor:pointer;transition:all .2s;background:#fff;user-select:none;flex:1;min-width:140px;position:relative;}
    .sell-card:hover{border-color:#F46036;background:#FFF6F3;}
    .sell-card.selected{border-color:#F46036;background:#FFF6F3;}
    .sell-card .sell-label{font-size:14px;font-weight:700;color:#333;}
    .sell-card.selected .sell-label{color:#F46036;}
    .sell-card .sell-example{font-size:12px;color:#999;}
    .sell-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;background:#F46036;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;}
    .growth-card{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1.5px solid #E5E7EB;border-radius:12px;cursor:pointer;transition:all .2s;background:#fff;user-select:none;}
    .growth-card:hover{border-color:#F46036;background:#FFF6F3;}
    .growth-card.selected{border-color:#F46036;background:#FFF6F3;}
    .plan-card{border:2px solid #E5E7EB;border-radius:16px;padding:18px 20px;background:#fff;transition:all .3s;position:relative;}
    .plan-card.selected-card{border-color:#F46036;box-shadow:0 8px 32px rgba(244,96,54,.15);transform:translateY(-2px);}
    .plan-card.faded{opacity:.5;}
    .simular-btn{width:100%;padding:16px;background:#F46036;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .simular-btn:hover{background:#D94F2A;transform:translateY(-1px);box-shadow:0 4px 16px rgba(244,96,54,.3);}
    .simular-btn:disabled{background:#D1D5DB;cursor:not-allowed;transform:none;box-shadow:none;}
    .nota-input{width:100%;padding:14px 16px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:16px;font-family:'DM Sans',sans-serif;color:#111;background:#fff;outline:none;transition:border-color .2s;}
    .nota-input:focus{border-color:#F46036;}
    .feature-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;}
    .feature-ok{background:#F0FDF4;color:#15803D;}
    .feature-no{background:#F9FAFB;color:#9CA3AF;}
    .result-enter{animation:fadeUp .4s ease forwards;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .radio-opt{padding:8px 14px;border:1.5px solid #E5E7EB;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;background:#fff;color:#555;}
    .radio-opt:hover{border-color:#F46036;color:#F46036;}
    .radio-opt.selected{border-color:#F46036;background:#FFF6F3;color:#F46036;}
    .divider{height:1px;background:#F3F4F6;}
    .banner-slide{animation:slideDown .5s cubic-bezier(.34,1.56,.64,1) forwards;}
    @keyframes slideDown{from{opacity:0;transform:translateY(-12px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    .contratar-btn{display:inline-block;padding:8px 20px;background:#fff;color:#F46036;border:2px solid #fff;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:.5px;transition:all .2s;white-space:nowrap;}
    .contratar-btn:hover{background:rgba(255,255,255,.85);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
    .contratar-mini{display:inline-block;margin-top:8px;padding:7px 16px;background:#F46036;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;}
    .contratar-mini:hover{background:#D94F2A;}
    .reset-btn{width:100%;padding:14px;background:transparent;color:#F46036;border:2px solid #F46036;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:28px;}
    .reset-btn:hover{background:#FFF6F3;}
    .banner-close{padding:10px 14px;background:transparent;color:#888;border:1px solid #444;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .anual-cta{padding:10px 20px;background:#F46036;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
    .anual-cta:hover{background:#D94F2A;}
    .insight-tag{display:inline-flex;align-items:center;gap:5px;background:#FFF6F3;color:#F46036;border:1px solid #FFD8CC;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;margin-top:8px;}
    .anual-tip{background:#111;border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .switch-anual-btn{padding:9px 18px;background:#F46036;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s;flex-shrink:0;}
    .switch-anual-btn:hover{background:#D94F2A;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const payLinks = {
      mensal: {
        basic:      "https://pay.hotmart.com/R3365539Y?off=x7ndzzsl&checkoutMode=10&sck=site-enotas--none&bid=1774891635886",
        plus:       "https://pay.hotmart.com/R3365539Y?off=nz0a4sy5&checkoutMode=10&sck=site-enotas--none&bid=1774891681942",
        pro:        "https://pay.hotmart.com/R3365539Y?off=havaqwdf&checkoutMode=10&sck=site-enotas--none&bid=1774891695954",
        business:   "https://pay.hotmart.com/R3365539Y?off=bxegkfzk&checkoutMode=10&bid=1760104234231&sck=site-enotas--none",
        enterprise: "https://pay.hotmart.com/R3365539Y?off=xp5now8n&checkoutMode=10&bid=1760104243484&sck=site-enotas--none",
      },
      anual: {
        basic:      "https://pay.hotmart.com/R3365539Y?off=a4xvylrr&checkoutMode=10&sck=site-enotas--none&bid=1774891751956",
        plus:       "https://pay.hotmart.com/R3365539Y?off=dmu5ytt7&checkoutMode=10&sck=site-enotas--none&bid=1774891773120",
        pro:        "https://pay.hotmart.com/R3365539Y?off=osigdmih&checkoutMode=10&sck=site-enotas--none",
        business:   "https://pay.hotmart.com/R3365539Y?off=aizacirf&checkoutMode=10&bid=1760104233670&sck=site-enotas--none",
        enterprise: "https://pay.hotmart.com/R3365539Y?off=w2jog6d6&checkoutMode=10&bid=1760104247388&sck=site-enotas--none",
      },
    };

    const plans = {
      mensal: [
        { id:"basic",      name:"Basic",      notasIncluidas:60,    notaExtra:0.77, preco:137,   adesao:179, importacaoVendas:0,        split:false, api:false, desc:"Ideal para quem está começando a vender online e quer simplificar a emissão das notas fiscais." },
        { id:"plus",       name:"Plus",       notasIncluidas:500,   notaExtra:0.57, preco:257,   adesao:347, importacaoVendas:300,      split:true,  api:false, desc:"Pensado para negócios em expansão que já lidam com um volume maior de vendas." },
        { id:"pro",        name:"Pro",        notasIncluidas:1500,  notaExtra:0.37, preco:347,   adesao:347, importacaoVendas:500,      split:true,  api:false, desc:"Feito para empresas que precisam emitir um alto volume de notas em operações mais complexas." },
        { id:"business",   name:"Business",   notasIncluidas:5000,  notaExtra:0.17, preco:737,   adesao:347, importacaoVendas:Infinity, split:true,  api:true,  desc:"Feito para empresas que precisam emitir um alto volume de notas em operações mais complexas." },
        { id:"enterprise", name:"Enterprise", notasIncluidas:10000, notaExtra:0.09, preco:1147,  adesao:347, importacaoVendas:Infinity, split:true,  api:true,  desc:"Voltado para operações robustas, que demandam alto volume de emissão de notas." },
      ],
      anual: [
        // Todos os planos anuais exceto Basic contemplam importação ilimitada de vendas antigas
        { id:"basic",      name:"Basic",      notasIncluidas:720,    notaExtra:0.77, preco:1227,  adesao:179, importacaoVendas:0,        split:false, api:false, desc:"Ideal para quem está começando a vender online e quer simplificar a emissão das notas fiscais." },
        { id:"plus",       name:"Plus",       notasIncluidas:6000,   notaExtra:0.47, preco:2297,  adesao:347, importacaoVendas:Infinity, split:true,  api:false, desc:"Pensado para negócios em expansão que já lidam com um volume maior de vendas." },
        { id:"pro",        name:"Pro",        notasIncluidas:18000,  notaExtra:0.27, preco:3119,  adesao:347, importacaoVendas:Infinity, split:true,  api:false, desc:"Feito para empresas que precisam emitir um alto volume de notas em operações mais complexas." },
        { id:"business",   name:"Business",   notasIncluidas:60000,  notaExtra:0.17, preco:6633,  adesao:347, importacaoVendas:Infinity, split:true,  api:true,  desc:"Feito para empresas que precisam emitir um alto volume de notas em operações mais complexas." },
        { id:"enterprise", name:"Enterprise", notasIncluidas:120000, notaExtra:0.09, preco:11400, adesao:347, importacaoVendas:Infinity, split:true,  api:true,  desc:"Voltado para operações robustas, que demandam alto volume de emissão de notas." },
      ],
    };

    const SELL_OPTIONS = [
      { value:"digital", label:"Produto digital", example:"Ex: E-book, Presets, Audiolivros" },
      { value:"fisico",  label:"Produto físico (Hotmart)",  example:"Ex: Livros, Suplementos, Itens Educacionais"  },
      { value:"servico", label:"Serviço",          example:"Ex: Videoaulas, Mentorias, Cursos Online" },
    ];

    const fmt = (v) => v.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });

    // notasMensal: sempre notas por mês
    // Para mensal: compara diretamente
    // Para anual:  compara com notasMensal * 12
    function getRecommendedPlan(periodicidade, notasMensal, needSplit, needApi, needImport, importQty, crescimento) {
      const lista    = plans[periodicidade];
      const notasRef = periodicidade === "anual" ? notasMensal * 12 : notasMensal;
      const highImport = needImport && (importQty === "mais500" || importQty === "ilimitada");
      const realImport = needImport && importQty !== "nao";

      let idx = lista.findIndex(p => {
        const splitOk  = !needSplit || p.split;
        const apiOk    = !needApi   || p.api;
        const importOk = !realImport || (
          highImport
            ? p.importacaoVendas === Infinity
            : p.importacaoVendas >= (importQty === "300" ? 300 : 500)
        );
        return splitOk && apiOk && importOk && p.notasIncluidas >= notasRef;
      });

      if (idx === -1) idx = lista.length - 1;
      if (crescimento === "acelerado" && idx < lista.length - 1) idx += 1;
      return lista[idx];
    }

    function SimTooltip({text}){
      return (
        <span style={{position:"relative",display:"inline-flex",alignItems:"center",cursor:"default"}}
          onMouseEnter={e=>e.currentTarget.querySelector(".stbox").style.cssText="visibility:visible;opacity:1;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;font-weight:500;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:99;pointer-events:none;line-height:1.4;transition:opacity .15s;"}
          onMouseLeave={e=>e.currentTarget.querySelector(".stbox").style.cssText="visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;font-weight:500;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:99;pointer-events:none;line-height:1.4;transition:opacity .15s;"}
        >
          <span style={{width:16,height:16,borderRadius:"50%",background:"rgba(255,255,255,.25)",color:"#fff",fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</span>
          <span className="stbox" style={{visibility:"hidden",opacity:0,position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",background:"#111",color:"#fff",fontSize:11,fontWeight:500,padding:"6px 10px",borderRadius:8,whiteSpace:"nowrap",zIndex:99,pointerEvents:"none",lineHeight:1.4,transition:"opacity .15s"}}>{text}</span>
        </span>
      );
    }

    function Simulador() {
      const [periodicidade, setPeriodicidade]     = useState("anual");
      const [notasMes, setNotasMes]               = useState("");
      const [tiposVenda, setTiposVenda]           = useState([]);
      const [crescimento, setCrescimento]         = useState(null);
      const [needSplit, setNeedSplit]             = useState(false);
      const [needApi, setNeedApi]                 = useState(false);
      const [needImport, setNeedImport]           = useState(false);
      const [importQty, setImportQty]             = useState("nao");
      const [showResult, setShowResult]           = useState(false);
      const [selectedPlanId, setSelectedPlanId]   = useState(null);
      const [showAnualBanner, setShowAnualBanner] = useState(false);
      const [showMensalBanner, setShowMensalBanner] = useState(false);
      const [bannerDismissed, setBannerDismissed] = useState(false);
      const timerRef = useRef(null);

      const notas       = parseInt(notasMes) || 0;
      const canSimulate = notas > 0 && tiposVenda.length > 0 && crescimento;
      const highImport  = needImport && (importQty === "mais500" || importQty === "ilimitada");
      const splitDisabled = tiposVenda.length > 0 && !(tiposVenda.includes("digital") && tiposVenda.includes("servico"));

      const toggleTipoVenda = (val) => {
        setTiposVenda(prev => prev.includes(val) ? prev.filter(v=>v!==val) : [...prev,val]);
      };

      const recommended   = showResult ? getRecommendedPlan(periodicidade, notas, needSplit, needApi, needImport, importQty, crescimento) : null;
      const recAnual      = showResult && periodicidade==="mensal" ? getRecommendedPlan("anual", notas, needSplit, needApi, needImport, importQty, crescimento) : null;
      const displayedPlan = showResult ? (plans[periodicidade].find(p=>p.id===selectedPlanId) || recommended) : null;

      const autoInsights = [];
      if (crescimento==="acelerado") autoInsights.push("Plano com margem de crescimento indicado para acompanhar sua expansão.");

      useEffect(() => {
        clearTimeout(timerRef.current);
        if (showResult && periodicidade==="mensal" && !bannerDismissed && !highImport) {
          setShowMensalBanner(true);
        }
        return () => clearTimeout(timerRef.current);
      }, [showResult, periodicidade, bannerDismissed, highImport]);

      const handleSimular = () => {
        if (!canSimulate) return;
        // Always default to anual
        setPeriodicidade("anual");
        const rec = getRecommendedPlan("anual", notas, needSplit, needApi, needImport, importQty, crescimento);
        setSelectedPlanId(rec.id);
        setShowResult(true);
        setShowAnualBanner(true);
        setShowMensalBanner(false);
        setBannerDismissed(false);
      };

      const handleReset = () => {
        setShowResult(false); setShowAnualBanner(false); setShowMensalBanner(false); setBannerDismissed(false);
        setNotasMes(""); setTiposVenda([]); setCrescimento(null);
        setNeedSplit(false); setNeedApi(false); setNeedImport(false);
        setImportQty("nao"); setSelectedPlanId(null);
        setPeriodicidade("anual"); setShowComparativo(false);
        clearTimeout(timerRef.current);
      };

      const switchTab = (per) => {
        setPeriodicidade(per);
        setShowAnualBanner(false);
        if (showResult) {
          const rec = getRecommendedPlan(per, notas, needSplit, needApi, needImport, importQty, crescimento);
          setSelectedPlanId(rec.id);
        }
      };

      const GrowthOption = ({ value, label, desc }) => (
        <div className={`growth-card ${crescimento===value?"selected":""}`} onClick={()=>setCrescimento(value)}>

          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14,color:crescimento===value?"#F46036":"#333"}}>{label}</div>
            <div style={{fontSize:12,color:"#888",marginTop:1}}>{desc}</div>
          </div>
          {crescimento===value && <span style={{color:"#F46036",fontSize:14,flexShrink:0,fontWeight:700}}>&#10003;</span>}
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"#FAFAFA"}}>
          <div style={{maxWidth:860,margin:"0 auto",padding:"40px 20px 80px"}}>

            {/* Hero */}
            <div style={{textAlign:"center",marginBottom:40}}>
              <div style={{display:"inline-block",background:"#FFF6F3",color:"#F46036",fontSize:12,fontWeight:700,padding:"6px 16px",borderRadius:20,marginBottom:16,letterSpacing:1,textTransform:"uppercase"}}>
                
              </div>
              <h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:800,letterSpacing:"-1.5px",lineHeight:1.1,marginBottom:12}}>
                Encontre o plano ideal<br/><span style={{color:"#F46036"}}>para a sua empresa.</span>
              </h1>
              <p style={{color:"#666",fontSize:15,maxWidth:460,margin:"0 auto"}}>
                Responda algumas perguntas e descubra qual plano se encaixa melhor com o seu negócio.
              </p>
              <p style={{color:"#888",fontSize:13,maxWidth:520,margin:"20px auto 0",textAlign:"center"}}>
                O eNotas funciona apenas para Pessoa Jurídica (PJ) com domicílio fiscal no Brasil.
              </p>
            </div>

            {/* Toggle Mensal / Anual — only visible in results */}
            {showResult && (
              <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginBottom:28}}>
                <div style={{background:"#F3F4F6",borderRadius:12,padding:4,display:"flex",gap:4}}>
                  <button className={`toggle-btn ${periodicidade==="mensal"?"active":"inactive"}`} onClick={()=>switchTab("mensal")}>Mensal</button>
                  <button className={`toggle-btn ${periodicidade==="anual"?"active":"inactive"}`}  onClick={()=>switchTab("anual")}>Anual</button>
                </div>
                {periodicidade==="anual" && (
                  <div style={{background:"#ECFDF5",color:"#16A34A",fontSize:12,fontWeight:700,padding:"5px 12px",borderRadius:20}}>25% de desconto</div>
                )}
              </div>
            )}

            {/* Banner anual — sempre visível no resultado anual */}
            {showResult && periodicidade==="anual" && (
              <div className="banner-slide" style={{marginBottom:24,background:"linear-gradient(135deg,#F46036 0%,#D94F2A 100%)",borderRadius:16,padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap",boxShadow:"0 8px 32px rgba(244,96,54,.3)"}}>
                <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                  <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:800,color:"#fff",fontSize:15}}>%</div>
                  <div>
                    <p style={{color:"#fff",fontWeight:700,fontSize:14,marginBottom:4}}>Você está no plano anual com 25% de desconto!</p>
                    <p style={{color:"rgba(255,255,255,.8)",fontSize:13,lineHeight:1.6}}>
                      No plano anual você economiza 25% em relação ao mensal.
                    </p>
                  </div>
                </div>
                <button className="anual-cta" style={{background:"#111",color:"#fff"}} onClick={()=>switchTab("mensal")}>Ver plano mensal</button>
              </div>
            )}

            {/* Banner mensal — aparece 5s após migrar para mensal */}
            {showMensalBanner && periodicidade==="mensal" && (
              <div className="banner-slide" style={{marginBottom:24,background:"linear-gradient(135deg,#111 0%,#222 100%)",borderRadius:16,padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap",boxShadow:"0 8px 32px rgba(0,0,0,.15)"}}>
                <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                  <div style={{background:"#F46036",borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:800,color:"#fff",fontSize:15}}>%</div>
                  <div>
                    <p style={{color:"#fff",fontWeight:700,fontSize:14,marginBottom:4}}>Economize 25% escolhendo o plano anual!</p>
                    <p style={{color:"#AAA",fontSize:13,lineHeight:1.6}}>
                      Se optar pelo plano anual, você irá economizar 25% no valor total a ser pago.<br/>
                      Clique ao lado para ver as condições do mesmo plano com desconto.
                    </p>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <button className="anual-cta" onClick={()=>switchTab("anual")}>Ver plano anual</button>
                  
                </div>
              </div>
            )}

            {/* ─── FORMULÁRIO ─── */}
            {!showResult ? (
              <div style={{background:"#fff",border:"1.5px solid #E5E7EB",borderRadius:20,padding:"32px",boxShadow:"0 4px 24px rgba(0,0,0,.04)"}}>

                {/* P1 — Notas por mês (sempre mensal como base) */}
                <div style={{marginBottom:28}}>
                  <label style={{display:"block",fontWeight:700,fontSize:15,marginBottom:6}}>Quantas notas fiscais você emite por mês?</label>
                  <p style={{color:"#888",fontSize:13,marginBottom:12}}>Estime sua média mensal de notas emitidas.</p>
                  <input type="number" className="nota-input" placeholder="Ex: 150" value={notasMes} min={1} onChange={e=>setNotasMes(e.target.value)}/>
                </div>

                <div className="divider" style={{marginBottom:28}}/>

                {/* P2 — O que vende */}
                <div style={{marginBottom:28}}>
                  <label style={{display:"block",fontWeight:700,fontSize:15,marginBottom:6}}>Qual tipo de infoproduto você vende?</label>
                  <p style={{color:"#888",fontSize:13,marginBottom:14}}>Pode selecionar mais de uma opção.</p>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    {SELL_OPTIONS.map(opt => {
                      const sel = tiposVenda.includes(opt.value);
                      return (
                        <div key={opt.value} className={`sell-card ${sel?"selected":""}`} onClick={()=>toggleTipoVenda(opt.value)}>
                          {sel && <span className="sell-check">&#10003;</span>}
                          <span className="sell-label">{opt.label}</span>
                          <span className="sell-example">{opt.example}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="divider" style={{marginBottom:28}}/>

                {/* P3 — Crescimento */}
                <div style={{marginBottom:28}}>
                  <label style={{display:"block",fontWeight:700,fontSize:15,marginBottom:6}}>Como está o crescimento do seu negócio?</label>
                  <p style={{color:"#888",fontSize:13,marginBottom:14}}>Isso nos ajuda a garantir que o plano vai acompanhar você.</p>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <GrowthOption value="estavel"   label="Estável"               desc="Volume de vendas previsível e constante." />
                    <GrowthOption value="moderado"  label="Crescimento moderado"  desc="Crescendo devagar, mas de forma consistente." />
                    <GrowthOption value="acelerado" label="Crescimento acelerado" desc="Expansão rápida — o volume de notas deve aumentar em breve." />
                  </div>
                  {crescimento==="acelerado" && (
                    <div className="insight-tag">Recomendamos um plano com folga para você não precisar migrar em pouco tempo</div>
                  )}
                </div>

                <div className="divider" style={{marginBottom:28}}/>

                {/* P4 — Funcionalidades */}
                <div style={{marginBottom:28}}>
                  <label style={{display:"block",fontWeight:700,fontSize:15,marginBottom:6}}>Alguma funcionalidade adicional?</label>
                  <p style={{color:"#888",fontSize:13,marginBottom:14}}>Opcional — marque se precisar de algo além do já identificado acima.</p>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>

                    {/* Split */}
                    {(() => {
                      return (
                        <>
                          <div
                            className={`checkbox-card ${needSplit && !splitDisabled ? "checked" : ""}`}
                            style={splitDisabled ? {opacity:.45, cursor:"not-allowed", pointerEvents:"none"} : {}}
                            onClick={()=>{ if(!splitDisabled) setNeedSplit(!needSplit); }}
                          >
                            <div className={`custom-check ${needSplit && !splitDisabled ? "checked" : ""}`}>
                              {needSplit && !splitDisabled && <span style={{color:"#fff",fontSize:12}}>&#10003;</span>}
                            </div>
                            <div>
                              <div style={{fontWeight:600,fontSize:14}}>Split de Notas (NFe / NFSe)</div>
                              <div style={{color:"#888",fontSize:12,marginTop:2}}>Divisão de um mesmo pagamento em uma nota de serviço e uma nota de produto.</div>
                            </div>
                          </div>
                          {splitDisabled && (
                            <div style={{background:"#FFF6F3",border:"1px solid #FFD8CC",borderRadius:10,padding:"9px 14px",fontSize:12,color:"#666",marginTop:-4,lineHeight:1.5}}>
                              Para emissões de produto físico, a nota deverá ser emitida como NF-e.
                            </div>
                          )}
                        </>
                      );
                    })()}

                    <div className={`checkbox-card ${needImport?"checked":""}`} onClick={()=>setNeedImport(!needImport)}>
                      <div className={`custom-check ${needImport?"checked":""}`}>{needImport&&<span style={{color:"#fff",fontSize:12}}>&#10003;</span>}</div>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>Importação de vendas antigas</div>
                        <div style={{color:"#888",fontSize:12,marginTop:2}}>Importe histórico de vendas para emissão retroativa de notas.</div>
                      </div>
                    </div>

                    {needImport && (
                      <div style={{background:"#FFF6F3",borderRadius:12,padding:"14px 16px",border:"1px solid #FFD8CC",marginTop:-4}}>
                        <label style={{display:"block",fontWeight:600,fontSize:13,marginBottom:10,color:"#555"}}>Quantas vendas antigas você precisa importar?</label>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          {[
                            {value:"nao",      label:"Não vou importar"},
                            {value:"300",      label:"Até 300"},
                            {value:"500",      label:"Até 500"},
                            {value:"mais500",  label:"Mais de 500"},
                          ].map(opt=>(
                            <div key={opt.value} className={`radio-opt ${importQty===opt.value?"selected":""}`} onClick={e=>{e.stopPropagation();setImportQty(opt.value);}}>{opt.label}</div>
                          ))}
                        </div>
                        {highImport && (
                          <div className="insight-tag" style={{display:"block",marginTop:12}}>
                            Para esse volume de importação, recomendamos a assinatura do plano anual — em certos planos ele contempla a importação ilimitada de vendas antigas.
                          </div>
                        )}
                      </div>
                    )}

                    <div className={`checkbox-card ${needApi?"checked":""}`} onClick={()=>setNeedApi(!needApi)}>
                      <div className={`custom-check ${needApi?"checked":""}`}>{needApi&&<span style={{color:"#fff",fontSize:12}}>&#10003;</span>}</div>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>Integração com API própria</div>
                        <div style={{color:"#888",fontSize:12,marginTop:2}}>Conecte o eNotas diretamente ao seu sistema via API.</div>
                      </div>
                    </div>

                  </div>
                </div>

                <button className="simular-btn" onClick={handleSimular} disabled={!canSimulate}>
                  Simular meu plano ideal
                </button>
                {!canSimulate && notasMes && (
                  <p style={{textAlign:"center",fontSize:12,color:"#AAA",marginTop:10}}>Preencha todas as perguntas para simular</p>
                )}
              </div>

            ) : (
              /* ─── RESULTADO ─── */
              <div className="result-enter">

                {/* Banner anual com plano equivalente (quando mensal + highImport) */}
                {periodicidade==="mensal" && highImport && recAnual && (
                  <div className="anual-tip" style={{marginBottom:24}}>
                    <div style={{display:"flex",gap:14,alignItems:"flex-start",flex:1}}>
                      <div style={{background:"#F46036",borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:800,color:"#fff",fontSize:15}}>%</div>
                      <div>
                        <p style={{color:"#fff",fontWeight:700,fontSize:14,marginBottom:4}}>Economize 25% com o plano anual!</p>
                        <p style={{color:"#AAA",fontSize:13,lineHeight:1.6}}>
                          No plano anual, o <strong style={{color:"#fff"}}>{recAnual.name}</strong> já atende seu volume de {notas} notas/mês ({(notas*12).toLocaleString("pt-BR")}/ano) com importação ilimitada de vendas antigas — por apenas <strong style={{color:"#F46036"}}>{fmt(recAnual.preco)}/ano</strong> (~{fmt(Math.round(recAnual.preco/12))}/mês).
                        </p>
                      </div>
                    </div>
                    <button className="switch-anual-btn" onClick={()=>switchTab("anual")}>Ver plano anual</button>
                  </div>
                )}

                {/* Banner anual voltando ao mensal após ver anual */}
                {periodicidade==="anual" && highImport && (
                  <div style={{background:"#FFF6F3",border:"1px solid #FFD8CC",borderRadius:12,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#555",lineHeight:1.6}}>
                    Este é o plano anual recomendado para o seu volume de importação. Caso prefira o mensal, clique na aba <strong>Mensal</strong> acima — mas lembre que no mensal apenas o Business e Enterprise contemplam importação acima de 500 vendas.
                  </div>
                )}

                {/* Insights automáticos */}
                {autoInsights.length > 0 && (
                  <div style={{background:"#fff",border:"1.5px solid #E5E7EB",borderRadius:14,padding:"16px 20px",marginBottom:20,display:"flex",flexDirection:"column",gap:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#888",letterSpacing:.5,textTransform:"uppercase",marginBottom:2}}>Identificamos automaticamente</div>
                    {autoInsights.map((msg,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13,color:"#444"}}>
                        <span style={{color:"#F46036",fontWeight:700,flexShrink:0}}>&#10003;</span>
                        <span>{msg}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Card principal */}
                {recommended && displayedPlan && (()=>{
                  const payUrl = payLinks[periodicidade][displayedPlan.id];
                  const isRec  = displayedPlan.id === recommended.id;
                  return (
                    <div style={{background:"linear-gradient(135deg,#F46036 0%,#FF7A55 100%)",borderRadius:20,padding:"28px",color:"#fff",marginBottom:28,position:"relative",overflow:"hidden",boxShadow:"0 12px 40px rgba(244,96,54,.25)"}}>
                      <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,.08)",pointerEvents:"none"}}/>
                      <div style={{position:"absolute",bottom:-50,right:60,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.05)",pointerEvents:"none"}}/>
                      <div style={{fontSize:12,fontWeight:700,opacity:.8,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
                        {isRec ? "Plano recomendado para você" : `Plano selecionado  |  Recomendado: ${recommended.name}`}
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16,marginBottom:20}}>
                        <div>
                          <h2 style={{fontSize:36,fontWeight:800,letterSpacing:"-1px",marginBottom:4}}>{displayedPlan.name}</h2>
                          <p style={{opacity:.85,fontSize:14,maxWidth:340}}>{displayedPlan.desc}</p>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,opacity:.8,marginBottom:2}}>{periodicidade==="anual"?"Total anual":"Por mês"}</div>
                          <div style={{fontSize:40,fontWeight:800,letterSpacing:"-1.5px",lineHeight:1}}>{fmt(displayedPlan.preco)}</div>
                          <div style={{fontSize:12,opacity:.7,marginTop:4}}>+ {fmt(displayedPlan.adesao)} taxa de adesao</div>
                        </div>
                      </div>

                      <div style={{background:"rgba(0,0,0,.15)",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
                        <div style={{fontSize:12,fontWeight:700,opacity:.7,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>O que esta incluido</div>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}>
                            <span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>&#10003;</span>
                            <span style={{opacity:.9}}>{periodicidade==="anual"?`${displayedPlan.notasIncluidas.toLocaleString("pt-BR")} notas fiscais por ano`:`${displayedPlan.notasIncluidas.toLocaleString("pt-BR")} notas fiscais por mês`}</span>
                          </div>
                          {displayedPlan.split&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>&#10003;</span><span style={{opacity:.9}}>Split de Notas (NFe / NFSe)</span></div>}
                          {displayedPlan.importacaoVendas===Infinity&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>&#10003;</span><span style={{opacity:.9,display:"flex",alignItems:"center",gap:6}}>Importação de vendas antigas ilimitada<SimTooltip text="Irá subtrair na franquia de notas contratada"/></span></div>}
                          {displayedPlan.importacaoVendas===0&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.15)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>x</span><span style={{opacity:.75}}>Não contempla importação de vendas antigas</span></div>}
                          {displayedPlan.importacaoVendas>0&&displayedPlan.importacaoVendas!==Infinity&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>&#10003;</span><span style={{opacity:.9}}>Importação de até {displayedPlan.importacaoVendas} vendas antigas</span></div>}
                          {displayedPlan.api&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>&#10003;</span><span style={{opacity:.9}}>Integração com API própria</span></div>}
                          <div style={{height:1,background:"rgba(255,255,255,.2)",margin:"2px 0"}}/>
                          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><span style={{background:"rgba(255,255,255,.2)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}>+</span><span style={{opacity:.75}}>{fmt(displayedPlan.notaExtra)} por nota adicional acima do limite</span></div>
                        </div>
                      </div>

                      <div style={{display:"flex",justifyContent:"flex-end"}}>
                        <a href={payUrl} target="_blank" rel="noopener noreferrer" className="contratar-btn">CONTRATAR</a>
                      </div>
                    </div>
                  );
                })()}

                {/* Comparativo — collapsible */}
                <div style={{border:"1.5px solid #E5E7EB",borderRadius:16,overflow:"hidden",marginTop:8}}>
                  <button
                    onClick={()=>setShowComparativo(v=>!v)}
                    style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",background:showComparativo?"#F9FAFB":"#fff",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}
                  >
                    <span style={{fontWeight:700,fontSize:15,color:"#333"}}>Compare com todos os planos ({periodicidade})</span>
                    <span style={{display:"inline-flex",alignItems:"center",transform:showComparativo?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}><svg width="18" height="10" viewBox="0 0 18 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1L9 9L17 1" stroke="#333" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></span>
                  </button>
                  {showComparativo && (
                    <div style={{padding:"4px 16px 16px",display:"flex",flexDirection:"column",gap:12,background:"#fff",borderTop:"1px solid #E5E7EB"}}>
                      {plans[periodicidade].map(plan=>{
                        const isRec      = recommended && plan.id===recommended.id;
                        const isSelected = plan.id===selectedPlanId;
                        const payUrl     = payLinks[periodicidade][plan.id];
                        return (
                          <div key={plan.id} className={`plan-card ${isSelected?"selected-card":"faded"}`} style={{cursor:"pointer"}} onClick={()=>setSelectedPlanId(plan.id)}>
                            {(isRec||isSelected) && (
                              <div style={{marginBottom:10,display:"flex",gap:6,flexWrap:"wrap"}}>
                                {isRec    && <span style={{background:"#F46036",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:.5,textTransform:"uppercase"}}>Recomendado</span>}
                                {isSelected&&!isRec&&<span style={{background:"#111",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:.5,textTransform:"uppercase"}}>Selecionado</span>}
                                {isSelected&&isRec &&<span style={{background:"#111",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:.5,textTransform:"uppercase"}}>Selecionado</span>}
                              </div>
                            )}
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                              <div style={{flex:1}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                                  <span style={{fontWeight:800,fontSize:17,letterSpacing:"-0.5px"}}>{plan.name}</span>
                                  <span style={{color:"#888",fontSize:12}}>{periodicidade==="anual"?`${plan.notasIncluidas.toLocaleString("pt-BR")} notas/ano`:`${plan.notasIncluidas.toLocaleString("pt-BR")} notas/mes`}</span>
                                </div>
                                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                  {plan.split&&<span className="feature-tag feature-ok">&#10003; Split NFe/NFSe</span>}
                                  {plan.api&&<span className="feature-tag feature-ok">&#10003; API própria</span>}
                                  {plan.importacaoVendas===Infinity&&<span className="feature-tag feature-ok">&#10003; Importação ilimitada</span>}
                                  {plan.importacaoVendas>0&&plan.importacaoVendas!==Infinity&&<span className="feature-tag feature-ok">&#10003; Importação até {plan.importacaoVendas}</span>}
                                  {!plan.split&&<span className="feature-tag feature-no">x Sem split</span>}
                                  {!plan.api&&<span className="feature-tag feature-no">x Sem API</span>}
                                  {plan.importacaoVendas===0&&<span className="feature-tag feature-no">x Sem importação de vendas</span>}
                                </div>
                              </div>
                              <div style={{textAlign:"right",flexShrink:0}}>
                                <div style={{fontSize:22,fontWeight:800,color:"#6B7280",letterSpacing:"-0.5px"}}>
                                  {fmt(plan.preco)}<span style={{fontSize:12,fontWeight:500,color:"#9CA3AF"}}>/{periodicidade==="anual"?"ano":"mes"}</span>
                                </div>
                                <div style={{fontSize:11,color:"#AAA",marginBottom:isSelected?2:0}}>+{fmt(plan.notaExtra)}/nota adicional &middot; adesão {fmt(plan.adesao)}</div>
                                {isSelected&&<a href={payUrl} target="_blank" rel="noopener noreferrer" className="contratar-mini" onClick={e=>e.stopPropagation()}>CONTRATAR</a>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <button className="reset-btn" onClick={handleReset}>Refazer simulacao</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Simulador/>);
  </script>
</body>
</html>
